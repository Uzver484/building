<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской Мегаполис 🌇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a3b2e, #0f2c21);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            overflow: hidden;
        }

        #gameContainer {
            background: #2d4a3b;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,200,0.3);
            border: 3px solid #b89b7b;
            display: flex;
            gap: 10px;
            max-width: 98vw;
            max-height: 98vh;
        }

        #gameArea {
            position: relative;
            width: 900px;
            height: 900px;
            background: #8b9a6e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        #gridCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            cursor: pointer;
        }

        #infoPanel {
            width: 200px;
            background: rgba(220, 200, 170, 0.98);
            border: 3px solid #8b6e4b;
            border-radius: 16px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            flex-shrink: 0;
            height: fit-content;
        }

        #infoPanel h3 {
            color: #8b0000;
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 2px solid #8b6e4b;
            padding-bottom: 5px;
            letter-spacing: 1.5px;
        }

        .statsGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }

        .statCard {
            background: rgba(139, 110, 75, 0.2);
            border: 1px solid #8b6e4b;
            border-radius: 8px;
            padding: 6px 3px;
            text-align: center;
        }

        .statLabel {
            font-size: 11px;
            color: #5a3e2b;
            text-transform: uppercase;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .statValue {
            font-size: 22px;
            color: #8b0000;
            font-weight: bold;
            line-height: 1.2;
        }

        #nextHouse {
            background: rgba(139, 110, 75, 0.3);
            border: 2px solid #8b6e4b;
            border-radius: 12px;
            padding: 8px;
            margin: 10px 0;
            text-align: center;
        }

        #nextHouseLabel {
            font-weight: bold;
            color: #2c1e0e;
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #nextHousePreview {
            width: 75px;
            height: 75px;
            margin: 6px auto;
            background: linear-gradient(135deg, #8b6e4b, #5a3e2b);
            border: 2px solid #ffd700;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #ffd700;
            text-shadow: 2px 2px 0 #8b0000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            position: relative;
        }

        .previewHouse {
            font-size: 30px;
            line-height: 1;
        }

        .previewMultiplier {
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 13px;
            color: #ffd700;
            background: rgba(139, 0, 0, 0.9);
            padding: 2px 5px;
            border-radius: 10px;
            border: 1px solid #ffd700;
        }

        .houseInfo {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            color: #2c1e0e;
            font-weight: bold;
            margin-top: 6px;
        }

        .houseInfo span {
            background: rgba(139, 110, 75, 0.2);
            padding: 3px 6px;
            border-radius: 8px;
        }

        .sovietButton {
            background: linear-gradient(135deg, #8b0000, #5a0000);
            border: 2px solid #ffd700;
            color: #ffd700;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            padding: 8px 10px;
            margin: 4px 0;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 8px;
        }

        .sovietButton:hover {
            background: linear-gradient(135deg, #a52a2a, #8b0000);
            transform: scale(1.01);
            box-shadow: 0 0 15px #ffd700;
        }

        #controlsHint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.7);
            padding: 5px 14px;
            border-radius: 30px;
            z-index: 20;
            border: 1px solid #ffd700;
            backdrop-filter: blur(5px);
            white-space: nowrap;
            font-weight: bold;
        }

        #messageBox {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 200, 170, 0.98);
            border: 4px solid #8b0000;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 70px rgba(255, 215, 0, 0.8);
            min-width: 300px;
        }

        #messageText {
            font-size: 24px;
            color: #8b0000;
            margin-bottom: 15px;
            font-family: 'Times New Roman', serif;
        }

        #messageStats {
            font-size: 18px;
            color: #2c1e0e;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .messageButtons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .messageButton {
            background: #8b0000;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .messageButton:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffd700;
        }

        .messageButton.secondary {
            background: #5a3e2b;
        }

        #progressBar {
            width: 100%;
            height: 6px;
            background: rgba(139, 110, 75, 0.3);
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
            border: 1px solid #8b6e4b;
        }

        #progressFill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #8b0000);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameArea">
            <div id="controlsHint">◀ ▶ Поворот • Клик по полю или дому</div>
            <canvas id="gridCanvas"></canvas>
        </div>
        
        <div id="infoPanel">
            <h3>ГОРСОВЕТ</h3>
            
            <div class="statsGrid">
                <div class="statCard">
                    <div class="statLabel">НАСЕЛЕНИЕ</div>
                    <div class="statValue" id="population">0</div>
                </div>
                <div class="statCard">
                    <div class="statLabel">ПОСТРОЕНО</div>
                    <div class="statValue" id="buildingsCount">0</div>
                </div>
                <div class="statCard">
                    <div class="statLabel">МАКС. ЭТАЖ</div>
                    <div class="statValue" id="maxFloors">1</div>
                </div>
                <div class="statCard">
                    <div class="statLabel">СВОБОДНО</div>
                    <div class="statValue" id="freeCells">196</div>
                </div>
            </div>
            
            <div id="progressBar">
                <div id="progressFill" style="width: 0%"></div>
            </div>
            
            <div id="nextHouse">
                <div id="nextHouseLabel">ОЧЕРЕДНОЙ ОБЪЕКТ</div>
                <div id="nextHousePreview">
                    <span class="previewHouse" id="previewHouseIcon">🏠</span>
                    <span class="previewMultiplier" id="previewMultiplier">x1</span>
                </div>
                <div class="houseInfo">
                    <span>Эт. <span id="nextHouseFloors">1</span></span>
                    <span>Жил. <span id="nextHouseCitizens">10</span></span>
                </div>
            </div>
            
            <button class="sovietButton" onclick="game.suggestPlacement()">ГОСПЛАН</button>
            <button class="sovietButton" onclick="game.newGame()">НОВАЯ ИГРА</button>
        </div>
    </div>
    
    <div id="messageBox">
        <div id="messageText">Заселение окончено!</div>
        <div id="messageStats"></div>
        <div class="messageButtons">
            <div class="messageButton" onclick="game.continueGame()">Заселить еще</div>
            <div class="messageButton secondary" onclick="game.hideMessage()">Закрыть</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        class CityGame {
            constructor() {
                this.gridSize = 14;
                this.grid = [];
                this.population = 0;
                this.buildingsCount = 0;
                this.maxFloors = 1;
                this.nextHouseFloors = 1;
                this.gameOver = false;
                this.gameFinished = false;
                
                // Параметры для поворота
                this.sceneRotation = 0;
                
                // Центр поля
                this.centerX = 6.5;
                this.centerY = 2;
                this.centerZ = 6.5;
                
                // Камера
                this.cameraPosition = {
                    x: 6.5,
                    y: 18,
                    z: 20
                };
                
                // Для рейкастинга
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2();
                this.plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                
                // 3D сцена
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.buildings = [];
                this.fieldGroup = null;
                
                // Текстуры
                this.textures = {};
                
                // Статистика жителей
                this.citizensPerFloor = {
                    1: 10, 2: 25, 3: 45, 4: 70, 5: 100,
                    6: 150, 7: 210, 8: 280, 9: 360, 10: 450,
                    11: 550, 12: 660, 13: 780, 14: 910
                };
                
                this.initGrid();
                this.loadTextures();
            }
            
            initGrid() {
                for (let i = 0; i < this.gridSize; i++) {
                    this.grid[i] = [];
                    for (let j = 0; j < this.gridSize; j++) {
                        this.grid[i][j] = 0;
                    }
                }
            }
            
            loadTextures() {
                const loader = new THREE.TextureLoader();
                
                // Загружаем все текстуры
                Promise.all([
                    // Трава
                    loader.loadAsync('textures/grass/normal.jpg').then(tex => this.textures.grassDiffuse = tex),
                    loader.loadAsync('https://threejs.org/examples/textures/terrain/grass_01_nor_1k.jpg').then(tex => this.textures.grassNormal = tex),
                    loader.loadAsync('https://threejs.org/examples/textures/terrain/grass_01_rough_1k.jpg').then(tex => this.textures.grassRough = tex),
                    
                    // Кирпич
                    loader.loadAsync('https://threejs.org/examples/textures/brick_diffuse.jpg').then(tex => this.textures.brickDiffuse = tex),
                    loader.loadAsync('https://threejs.org/examples/textures/brick_normal.jpg').then(tex => this.textures.brickNormal = tex),
                    loader.loadAsync('https://threejs.org/examples/textures/brick_roughness.jpg').then(tex => this.textures.brickRough = tex),
                    
                    // Крыша
                    loader.loadAsync('https://threejs.org/examples/textures/roof/roof_diff_1k.jpg').then(tex => this.textures.roofDiffuse = tex),
                    loader.loadAsync('https://threejs.org/examples/textures/roof/roof_nor_1k.jpg').then(tex => this.textures.roofNormal = tex),
                    
                    // Дерево
                    loader.loadAsync('https://threejs.org/examples/textures/terrain/terrain_wood_diff_1k.jpg').then(tex => this.textures.woodDiffuse = tex)
                ]).then(() => {
                    // Настройка повторения текстур
                    Object.values(this.textures).forEach(tex => {
                        tex.wrapS = THREE.RepeatWrapping;
                        tex.wrapT = THREE.RepeatWrapping;
                        tex.repeat.set(4, 4);
                    });
                    
                    // Инициализация сцены после загрузки текстур
                    this.initThree();
                    this.generateNextHouse();
                    this.updateInfo();
                    this.setupEventListeners();
                });
            }
            
            initThree() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87CEEB);
                
                // Создаем группу для вращения поля
                this.fieldGroup = new THREE.Group();
                this.fieldGroup.position.set(this.centerX, 0, this.centerZ);
                
                this.camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
                
                const canvas = document.getElementById('gridCanvas');
                this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
                this.renderer.setSize(900, 900);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // --- КРАСИВЫЙ 3D ФОН ---
                
                // Небесная сфера
                const skyGeo = new THREE.SphereGeometry(100, 32, 16);
                const skyMat = new THREE.MeshBasicMaterial({
                    color: 0x87CEEB,
                    side: THREE.BackSide
                });
                const sky = new THREE.Mesh(skyGeo, skyMat);
                this.scene.add(sky);
                
                // Облака
                const cloudMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: 0x333333,
                    transparent: true,
                    opacity: 0.8
                });
                
                for (let i = 0; i < 15; i++) {
                    const cloudGroup = new THREE.Group();
                    
                    for (let j = 0; j < 5; j++) {
                        const sphere = new THREE.Mesh(
                            new THREE.SphereGeometry(0.8 + Math.random() * 0.5, 6, 6),
                            cloudMat
                        );
                        sphere.position.set(j * 1.2 - 2.5, Math.sin(j) * 0.3, 0);
                        cloudGroup.add(sphere);
                    }
                    
                    cloudGroup.position.set(
                        (Math.random() - 0.5) * 50,
                        12 + Math.random() * 8,
                        (Math.random() - 0.5) * 40 - 15
                    );
                    cloudGroup.scale.set(1.5, 0.6, 1);
                    this.scene.add(cloudGroup);
                }
                
                // --- ОСВЕЩЕНИЕ ---
                
                // Солнце
                const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
                sunLight.position.set(15, 25, 15);
                sunLight.castShadow = true;
                sunLight.shadow.mapSize.width = 2048;
                sunLight.shadow.mapSize.height = 2048;
                sunLight.shadow.camera.near = 0.5;
                sunLight.shadow.camera.far = 50;
                sunLight.shadow.camera.left = -15;
                sunLight.shadow.camera.right = 15;
                sunLight.shadow.camera.top = 15;
                sunLight.shadow.camera.bottom = -15;
                this.scene.add(sunLight);
                
                // Мягкий свет
                const ambientLight = new THREE.AmbientLight(0x404060, 0.9);
                this.scene.add(ambientLight);
                
                // Заполняющий свет
                const fillLight = new THREE.PointLight(0xffaa88, 0.6);
                fillLight.position.set(-10, 15, 20);
                this.scene.add(fillLight);
                
                // --- ТРАВА С РЕАЛЬНОЙ ТЕКСТУРОЙ ---
                
                // Основная трава вокруг поля
                const grassMat = new THREE.MeshStandardMaterial({
                    map: this.textures.grassDiffuse,
                    normalMap: this.textures.grassNormal,
                    roughnessMap: this.textures.grassRough,
                    roughness: 0.8,
                    color: 0xffffff
                });
                
                const mainGrassGeo = new THREE.PlaneGeometry(40, 40, 50, 50);
                const mainGrass = new THREE.Mesh(mainGrassGeo, grassMat);
                mainGrass.rotation.x = -Math.PI / 2;
                mainGrass.position.set(this.centerX, -0.02, this.centerZ);
                mainGrass.receiveShadow = true;
                this.scene.add(mainGrass);
                
                // Игровое поле с текстурой травы (вращается)
                const fieldMat = new THREE.MeshStandardMaterial({
                    map: this.textures.grassDiffuse,
                    normalMap: this.textures.grassNormal,
                    roughnessMap: this.textures.grassRough,
                    roughness: 0.7,
                    color: 0xffffff
                });
                
                const fieldGeo = new THREE.PlaneGeometry(this.gridSize, this.gridSize, 20, 20);
                const field = new THREE.Mesh(fieldGeo, fieldMat);
                field.rotation.x = -Math.PI / 2;
                field.position.set(0, 0, 0);
                field.receiveShadow = true;
                this.fieldGroup.add(field);
                
                // --- НЕНАВЯЗЧИВАЯ СЕТКА ПОД ТРАВОЙ ---
                const gridHelper = new THREE.GridHelper(this.gridSize, this.gridSize, 0x8b6e4b, 0x5a3e2b);
                gridHelper.position.set(this.centerX, 0.005, this.centerZ);
                gridHelper.material.opacity = 0.3;
                gridHelper.material.transparent = true;
                this.scene.add(gridHelper);
                
                // Добавляем маленькие золотые точки по углам для ориентации
                const dotMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x332200 });
                const corners = [
                    [0, 0], [0, this.gridSize-1],
                    [this.gridSize-1, 0], [this.gridSize-1, this.gridSize-1]
                ];
                
                corners.forEach(([x, z]) => {
                    const dotGeo = new THREE.SphereGeometry(0.1, 8, 8);
                    const dot = new THREE.Mesh(dotGeo, dotMat);
                    dot.position.set(x, 0.01, z);
                    this.fieldGroup.add(dot);
                });
                
                this.scene.add(this.fieldGroup);
                
                // Камера
                this.camera.position.set(this.cameraPosition.x, this.cameraPosition.y, this.cameraPosition.z);
                this.camera.lookAt(this.centerX, this.centerY, this.centerZ);
                this.camera.up.set(0, 0, 1);
                
                this.animate();
            }
            
            createHouse(floors, x, z) {
                const group = new THREE.Group();
                
                // Материалы с реальными текстурами
                const brickMat = new THREE.MeshStandardMaterial({
                    map: this.textures.brickDiffuse,
                    normalMap: this.textures.brickNormal,
                    roughnessMap: this.textures.brickRough,
                    roughness: 0.6,
                    color: 0xffffff
                });
                
                const roofMat = new THREE.MeshStandardMaterial({
                    map: this.textures.roofDiffuse,
                    normalMap: this.textures.roofNormal,
                    roughness: 0.7,
                    color: 0xffffff
                });
                
                const woodMat = new THREE.MeshStandardMaterial({
                    map: this.textures.woodDiffuse,
                    roughness: 0.9
                });
                
                const height = floors * 0.6;
                
                // Основное здание
                const buildingGeo = new THREE.BoxGeometry(0.95, height, 0.95);
                const building = new THREE.Mesh(buildingGeo, brickMat);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                group.add(building);
                
                // Крыша
                if (floors >= 3) {
                    const roofGeo = new THREE.ConeGeometry(0.6, 0.4, 8);
                    const roof = new THREE.Mesh(roofGeo, roofMat);
                    roof.position.y = height + 0.2;
                    roof.castShadow = true;
                    group.add(roof);
                    
                    if (floors >= 5) {
                        const starGeo = new THREE.OctahedronGeometry(0.2);
                        const starMat = new THREE.MeshStandardMaterial({
                            color: 0xffd700,
                            emissive: 0x442200
                        });
                        const star = new THREE.Mesh(starGeo, starMat);
                        star.position.y = height + 0.5;
                        group.add(star);
                    }
                }
                
                // Окна
                for (let f = 0; f < floors; f++) {
                    const yPos = f * 0.6 + 0.3;
                    
                    // Рама окна
                    const frameGeo = new THREE.BoxGeometry(0.25, 0.25, 0.05);
                    const frame = new THREE.Mesh(frameGeo, woodMat);
                    frame.position.set(0, yPos, 0.48);
                    frame.castShadow = true;
                    group.add(frame);
                    
                    // Стекло
                    const glassGeo = new THREE.BoxGeometry(0.2, 0.2, 0.02);
                    const glassMat = new THREE.MeshStandardMaterial({
                        color: 0x88aaff,
                        emissive: 0x112233,
                        transparent: true,
                        opacity: 0.7
                    });
                    const glass = new THREE.Mesh(glassGeo, glassMat);
                    glass.position.set(0, yPos, 0.5);
                    glass.castShadow = true;
                    group.add(glass);
                }
                
                group.position.set(x - this.centerX + 0.5, 0, z - this.centerZ + 0.5);
                return group;
            }
            
            setupEventListeners() {
                const canvas = document.getElementById('gridCanvas');
                
                canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
                
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') {
                        this.rotateField('left');
                    } else if (e.key === 'ArrowRight') {
                        this.rotateField('right');
                    }
                });
                
                window.addEventListener('resize', () => {
                    const container = document.getElementById('gameArea');
                    const width = container.clientWidth;
                    const height = container.clientHeight;
                    this.renderer.setSize(width, height);
                    this.camera.aspect = width / height;
                    this.camera.updateProjectionMatrix();
                });
            }
            
            rotateField(direction) {
                const rotationSpeed = Math.PI / 4;
                
                if (direction === 'left') {
                    this.sceneRotation += rotationSpeed;
                } else {
                    this.sceneRotation -= rotationSpeed;
                }
                
                this.fieldGroup.rotation.y = this.sceneRotation;
            }
            
            getGridCellFromRay(ray) {
                const intersection = new THREE.Vector3();
                
                if (ray.intersectPlane(this.plane, intersection)) {
                    const localPoint = intersection.clone();
                    localPoint.sub(new THREE.Vector3(this.centerX, 0, this.centerZ));
                    
                    const quaternion = new THREE.Quaternion().setFromEuler(
                        new THREE.Euler(0, -this.sceneRotation, 0)
                    );
                    localPoint.applyQuaternion(quaternion);
                    
                    localPoint.add(new THREE.Vector3(this.centerX, 0, this.centerZ));
                    
                    const gridX = Math.floor(localPoint.x);
                    const gridY = Math.floor(localPoint.z);
                    
                    if (localPoint.x >= gridX && localPoint.x < gridX + 1 && 
                        localPoint.z >= gridY && localPoint.z < gridY + 1 &&
                        gridX >= 0 && gridX < this.gridSize && 
                        gridY >= 0 && gridY < this.gridSize) {
                        return { x: gridX, y: gridY };
                    }
                }
                return null;
            }
            
            handleCanvasClick(event) {
                if (this.gameOver) return;
                
                const rect = event.target.getBoundingClientRect();
                const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                this.mouse.set(x, y);
                this.raycaster.setFromCamera(this.mouse, this.camera);
                
                const cell = this.getGridCellFromRay(this.raycaster.ray);
                
                if (cell) {
                    if (this.grid[cell.x][cell.y] > 0 && this.grid[cell.x][cell.y] === this.nextHouseFloors) {
                        this.upgradeHouse(cell.x, cell.y);
                    }
                    else if (this.grid[cell.x][cell.y] === 0) {
                        this.placeHouse(cell.x, cell.y);
                    }
                }
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                // Анимация облаков
                this.scene.children.forEach(child => {
                    if (child.isGroup && child.children.length > 0 && 
                        child.children[0] instanceof THREE.Mesh && 
                        child.children[0].material && 
                        child.children[0].material.color.getHex() === 0xffffff) {
                        child.position.x += 0.005;
                        if (child.position.x > 30) child.position.x = -30;
                    }
                });
                
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
            
            updateGrid() {
                if (this.buildings.length > 0) {
                    this.buildings.forEach(b => this.fieldGroup.remove(b));
                    this.buildings = [];
                }
                
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        const floors = this.grid[i][j];
                        if (floors > 0) {
                            const house = this.createHouse(floors, i, j);
                            this.fieldGroup.add(house);
                            this.buildings.push(house);
                        }
                    }
                }
                
                this.updateInfo();
            }
            
            placeHouse(row, col) {
                if (this.gameFinished) return false;
                
                this.grid[row][col] = this.nextHouseFloors;
                this.buildingsCount++;
                
                const citizens = this.citizensPerFloor[this.nextHouseFloors] || (this.nextHouseFloors * 20);
                this.population += citizens;
                
                this.checkMerges();
                this.updateMaxFloors();
                this.generateNextHouse();
                this.updateGrid();
                
                const totalCells = this.gridSize * this.gridSize;
                const progress = (this.buildingsCount / totalCells) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                
                this.checkGameOver();
                
                return true;
            }
            
            upgradeHouse(row, col) {
                if (this.gameFinished) return false;
                
                const oldFloors = this.grid[row][col];
                const newFloors = oldFloors + 1;
                
                const oldCitizens = this.citizensPerFloor[oldFloors] || (oldFloors * 20);
                this.population -= oldCitizens;
                
                this.grid[row][col] = newFloors;
                const newCitizens = this.citizensPerFloor[newFloors] || (newFloors * 20);
                this.population += newCitizens;
                
                this.updateMaxFloors();
                this.generateNextHouse();
                this.updateGrid();
                
                this.checkGameOver();
                
                return true;
            }
            
            checkGameOver() {
                const totalCells = this.gridSize * this.gridSize;
                const freeCells = totalCells - this.buildingsCount;
                
                let canUpgrade = false;
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        if (this.grid[i][j] === this.nextHouseFloors) {
                            canUpgrade = true;
                            break;
                        }
                    }
                }
                
                if (freeCells === 0 && !canUpgrade) {
                    this.gameFinished = true;
                    this.showGameOverMessage();
                }
            }
            
            showGameOverMessage() {
                document.getElementById('messageText').textContent = 'Заселение окончено!';
                document.getElementById('messageStats').textContent = `Всего жителей: ${this.population}`;
                document.getElementById('messageBox').style.display = 'block';
            }
            
            continueGame() {
                this.gameFinished = false;
                this.hideMessage();
                
                for (let i = 0; i < 5; i++) {
                    if (this.buildingsCount < this.gridSize * this.gridSize) {
                        for (let row = 0; row < this.gridSize; row++) {
                            for (let col = 0; col < this.gridSize; col++) {
                                if (this.grid[row][col] === 0) {
                                    this.grid[row][col] = Math.floor(Math.random() * 3) + 1;
                                    this.buildingsCount++;
                                    this.population += this.citizensPerFloor[this.grid[row][col]] || (this.grid[row][col] * 20);
                                    break;
                                }
                            }
                        }
                    }
                }
                
                this.updateGrid();
                this.checkGameOver();
            }
            
            checkMerges() {
                let merged = false;
                
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        if (this.grid[i][j] === 0) continue;
                        
                        const floors = this.grid[i][j];
                        
                        if (j + 1 < this.gridSize && this.grid[i][j + 1] === floors) {
                            this.grid[i][j] = floors + 1;
                            this.grid[i][j + 1] = 0;
                            merged = true;
                            this.buildingsCount--;
                            
                            const newCitizens = this.citizensPerFloor[floors + 1] || ((floors + 1) * 20);
                            this.population += newCitizens;
                        }
                        
                        if (i + 1 < this.gridSize && this.grid[i + 1][j] === floors) {
                            this.grid[i][j] = floors + 1;
                            this.grid[i + 1][j] = 0;
                            merged = true;
                            this.buildingsCount--;
                            
                            const newCitizens = this.citizensPerFloor[floors + 1] || ((floors + 1) * 20);
                            this.population += newCitizens;
                        }
                    }
                }
                
                if (merged) {
                    this.checkMerges();
                }
            }
            
            generateNextHouse() {
                const rand = Math.random();
                if (rand < 0.35) this.nextHouseFloors = 1;
                else if (rand < 0.6) this.nextHouseFloors = 2;
                else if (rand < 0.8) this.nextHouseFloors = 3;
                else if (rand < 0.93) this.nextHouseFloors = 4;
                else this.nextHouseFloors = 5;
                
                document.getElementById('previewHouseIcon').textContent = '🏠';
                document.getElementById('previewMultiplier').textContent = `x${this.nextHouseFloors}`;
                document.getElementById('nextHouseFloors').textContent = this.nextHouseFloors;
                document.getElementById('nextHouseCitizens').textContent = 
                    this.citizensPerFloor[this.nextHouseFloors] || (this.nextHouseFloors * 20);
            }
            
            updateInfo() {
                document.getElementById('population').textContent = this.population;
                document.getElementById('buildingsCount').textContent = this.buildingsCount;
                document.getElementById('maxFloors').textContent = this.maxFloors;
                
                const freeCells = this.gridSize * this.gridSize - this.buildingsCount;
                document.getElementById('freeCells').textContent = freeCells;
            }
            
            updateMaxFloors() {
                let max = 0;
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        max = Math.max(max, this.grid[i][j]);
                    }
                }
                this.maxFloors = max;
            }
            
            suggestPlacement() {
                if (this.gameFinished) return;
                
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        if (this.grid[i][j] === this.nextHouseFloors) {
                            this.upgradeHouse(i, j);
                            return;
                        }
                    }
                }
                
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        if (this.grid[i][j] === 0) {
                            this.placeHouse(i, j);
                            return;
                        }
                    }
                }
            }
            
            newGame() {
                this.initGrid();
                this.population = 0;
                this.buildingsCount = 0;
                this.maxFloors = 1;
                this.gameOver = false;
                this.gameFinished = false;
                this.generateNextHouse();
                this.updateGrid();
                this.hideMessage();
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('freeCells').textContent = this.gridSize * this.gridSize;
                
                this.sceneRotation = 0;
                if (this.fieldGroup) this.fieldGroup.rotation.y = 0;
            }
            
            showMessage(text) {
                document.getElementById('messageText').textContent = text;
                document.getElementById('messageBox').style.display = 'block';
            }
            
            hideMessage() {
                document.getElementById('messageBox').style.display = 'none';
            }
            
            floorColors = {
                1: 0xd4b28c, 2: 0xc49a6c, 3: 0xb87c4b, 4: 0x9e5e3a,
                5: 0x7a4a2c, 6: 0x5a3e2b, 7: 0x4a2e1b, 8: 0x8b4513,
                9: 0xcd853f, 10: 0xdaa520, 11: 0xb8860b, 12: 0x8b6914,
                13: 0x9c7a3c, 14: 0xad8b4c
            };
        }
        
        const game = new CityGame();
        window.game = game;
    </script>
</body>
</html>
